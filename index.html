<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    
  </style>
</head>
<body>
  <div class="container">
    <div class="title">
      <h1>Rock Paper Scissors!</h1>
      <p>(Best of 5)</p>
    </div>
    
    <div class="round-container">
      <h2>Round <span class="round-count">1</span></h2>
      <div class="versus-container">
        <div class="player-container">
          <p>(Choose your weapon)</p>
          <div id="rpsButtons">
            <button type="button" class="choice-buttons" id="rock">Rock</button>
            <button type="button" class="choice-buttons" id="paper">Paper</button>
            <button type="button" class="choice-buttons" id="scissors">Scissors</button>
          </div>
          <p class="player-stats stats">You: <span id="playerScore">0</span></p>
        </div>
        <p class="versus">VS</p>
        <p class="computer-stats stats">Computer: <span id="computerScore">0</span></p>
      </div>
    </div>
  </div>
  


  <script src="./script.js"></script>
</body>
</html>
